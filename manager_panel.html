<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs", 
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- الإعدادات الثابتة والمواعيد ---
    const WORKING_DAYS = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"];
    
    // 💡 قائمة المتطوعين (تم التعديل: كل متطوع في سطر لتسهيل التعديل)
    const FIXED_VOLUNTEERS = {
    "شيماء":            WORKING_DAYS,
    "حبيبة":            WORKING_DAYS,
    "رحاب":             ["السبت", "الأحد", "الثلاثاء"],
    "أحمد":             WORKING_DAYS,
    "محمد إبراهيم":     WORKING_DAYS,
    "ساندي":            ["السبت", "الأحد", "الأربعاء", "الخميس"],
    "إبراهيم":          [],
    "معاذ":             ["الأحد", "الثلاثاء", "الخميس"],
    "سامى":             ["السبت", "الأحد"],
    "مازن":             WORKING_DAYS,
    "معتز":             WORKING_DAYS,
    "شمس":              WORKING_DAYS
};

    // الترتيب المطلوب للعرض
    const VOLUNTEER_NAMES_ORDERED = Object.keys(FIXED_VOLUNTEERS);
    
    // المتغيرات العامة
    let allAttendanceData = {};
    let cycleWeeks = [];
    let cycleDaysCache = {};
    let currentWhatsappData = {};
    let finalReportData = {};
    let currentCycleInfo = {};
    
    // التعديل هنا: متغير لحفظ الدورة المخصصة
    let customCycleStart = null; 

    const DAY_MAP = { 0: "الأحد", 1: "الإثنين", 2: "الثلاثاء", 3: "الأربعاء", 4: "الخميس", 5: "الجمعة", 6: "السبت" };
    const MONTH_MAP = {
        "يناير": 0, "فبراير": 1, "مارس": 2, "أبريل": 3, "مايو": 4, "يونيو": 5, 
        "يوليو": 6, "أغسطس": 7, "سبتمبر": 8, "أكتوبر": 9, "نوفمبر": 10, "ديسمبر": 11,
        "ينايـر": 0, "فبرايـر": 1, "مـارس": 2, "إبريـل": 3, "مايـو": 4, "يونيـو": 5, 
        "يوليـو": 6, "أغسطـس": 7, "سبتمبـر": 8, "أكتوبـر": 9, "نوفمبـر": 10, "ديسمبـر": 11 
    };

    // --- التعديل هنا: دوال القائمة المنسدلة للشهور ---
    function populateMonthSelector() {
        const selector = document.getElementById('month-selector');
        const today = new Date();
        
        let currentStart;
        if (today.getDate() <= 25) {
            currentStart = new Date(today.getFullYear(), today.getMonth() - 1, 26);
        } else {
            currentStart = new Date(today.getFullYear(), today.getMonth(), 26);
        }

        const arMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        // شهر مقدم (+1) لغاية 10 شهور ورا (-10) بالإضافة للشهر الحالي (0) = 12 شهر
        for (let i = 1; i >= -10; i--) {
            let s = new Date(currentStart.getFullYear(), currentStart.getMonth() + i, 26);
            let e = new Date(currentStart.getFullYear(), currentStart.getMonth() + i + 1, 25);
            
            let option = document.createElement('option');
            option.value = s.toISOString(); // نحفظ تاريخ بداية الدورة
            
            option.text = `دورة ${arMonths[e.getMonth()]} ${e.getFullYear()}`;
            
            if (i === 0) {
                option.selected = true; // نحدد الدورة الحالية كافتراضي
            }
            selector.appendChild(option);
        }
    }

    function changeMonthCycle() {
        const selector = document.getElementById('month-selector');
        customCycleStart = new Date(selector.value);
        
        // استدعاء دالة تحديث البيانات بالدورة الجديدة
        if (typeof initializeWeeksAndFetchData === "function") {
            initializeWeeksAndFetchData();
        }
    }

    // --- دوال مساعدة للتواريخ ---

    function formatDateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function parseRegistrationDate(data) {
        let recordDate = null;
        if (data.dateKey && data.dateKey.match(/^\d{4}-\d{2}-\d{2}$/)) {
            recordDate = new Date(data.dateKey); 
        } else if (data.registrationDateTimestamp && typeof data.registrationDateTimestamp.toDate === 'function') {
            recordDate = data.registrationDateTimestamp.toDate();
        } else if (data.registrationTime) {
            const timeString = data.registrationTime;
            const datePart = timeString.split(' – ')[0].trim();
            const parts = datePart.split(' ');
            if (parts.length >= 3) {
                const day = parseInt(parts[0]);
                const monthName = parts[1].trim().replace(/[\u200e\u200f\s]/g, ''); 
                const month = MONTH_MAP[monthName];
                const year = parseInt(parts[2]);
                if (!isNaN(day) && month !== undefined && !isNaN(year)) {
                    recordDate = new Date(year, month, day);
                }
            }
        }
        if (recordDate && !isNaN(recordDate)) {
             recordDate.setHours(0, 0, 0, 0); 
             return recordDate;
        }
        return null;
    }

    // --- دوال الواجهة ---
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }

    function renderCalendar(date, containerId, titleId) {
        const arMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        const year = date.getFullYear();
        const month = date.getMonth();
        document.getElementById(titleId).innerText = `${arMonths[month]} ${year}`;
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        let html = '<table class="mini-calendar"><thead><tr><th>ح</th><th>ن</th><th>ث</th><th>ر</th><th>خ</th><th>ج</th><th>س</th></tr></thead><tbody><tr>';
        for(let i=0; i<firstDay.getDay(); i++) html += '<td></td>';
        const today = new Date();
        for(let d=1; d<=lastDay.getDate(); d++) {
            const curr = new Date(year, month, d);
            const isToday = (curr.toDateString() === today.toDateString());
            html += `<td class="${isToday ? 'current-day' : ''}">${d}</td>`;
            if(curr.getDay() === 6) html += '</tr><tr>';
        }
        html += '</tr></tbody></table>';
        document.getElementById(containerId).innerHTML = html;
    }

    function initSidebar() {
        const now = new Date();
        renderCalendar(now, 'cal-current-body', 'cal-current-title');
        renderCalendar(new Date(now.getFullYear(), now.getMonth()+1, 1), 'cal-next-body', 'cal-next-title');
        populateMonthSelector(); // التعديل هنا: تشغيل القائمة عند التحميل
    }

    // --- منطق الدورة والأسابيع ---

    // التعديل هنا: الدالة بقت بتعتمد على الدورة المخصصة لو المستخدم اختارها
    function getCycleDates() {
        let start, end;
        
        if (customCycleStart) {
            // لو تم اختيار شهر معين من القائمة
            start = new Date(customCycleStart);
            end = new Date(start.getFullYear(), start.getMonth() + 1, 25);
        } else {
            // الوضع الافتراضي (الشهر الحالي)
            const today = new Date();
            if (today.getDate() <= 25) {
                start = new Date(today.getFullYear(), today.getMonth() - 1, 26);
                end = new Date(today.getFullYear(), today.getMonth(), 25);
            } else {
                start = new Date(today.getFullYear(), today.getMonth(), 26);
                end = new Date(today.getFullYear(), today.getMonth() + 1, 25);
            }
        }
        
        start.setHours(0,0,0,0); end.setHours(23,59,59,999);
        
        const formatter = new Intl.DateTimeFormat('ar-EG', { day: 'numeric', month: 'long' });
        return { start, end, label: `${formatter.format(start)} إلى ${formatter.format(end)}` };
    }

    function buildWeeks(start, end) {
        let curr = new Date(start);
        
        let tempDate = new Date(start);
        while (tempDate.getDay() !== 6) {
            tempDate.setDate(tempDate.getDate() - 1);
        }
        curr = tempDate;

        cycleWeeks = [];
        cycleDaysCache = {};

        while(curr <= end) {
            let weekDays = [];
            for(let i=0; i<7; i++) {
                let d = new Date(curr);
                let arDay = DAY_MAP[d.getDay()];
                let key = formatDateKey(d);
                
                const isInCycle = d >= start && d <= end;
                const isWork = WORKING_DAYS.includes(arDay);

                let info = { date: d, dayName: arDay, dateKey: key, isWork: isWork, inCycle: isInCycle };
                
                if (isInCycle) {
                    weekDays.push(info);
                    cycleDaysCache[key] = info;
                }
                
                curr.setDate(curr.getDate() + 1);
            }
            
            if(weekDays.length > 0) {
                cycleWeeks.push({ 
                    id: cycleWeeks.length+1, 
                    days: weekDays,
                    label: `${weekDays[0].date.getDate()}/${weekDays[0].date.getMonth()+1} - ${weekDays[weekDays.length-1].date.getDate()}/${weekDays[weekDays.length-1].date.getMonth()+1}`
                });
            }
        }
    }

    // --- جلب البيانات وتحديث الواجهة ---

    function renderWeeksButtons() {
        const container = document.getElementById('week-buttons-conta
