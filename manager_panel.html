<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة السنوي - الأرشيف والتقارير</title>
    <style>
        :root {
            --sidebar-width: 250px;
            --primary-color: #007bff;
            --bg-color: #f4f4f9;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex; /* لتفعيل القائمة الجانبية */
            background-color: var(--bg-color);
            direction: rtl;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #2c3e50;
            color: white;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            overflow-y: auto;
            padding: 20px 0;
            z-index: 1000;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 1.2em;
            padding-bottom: 20px;
            border-bottom: 1px solid #34495e;
        }

        .month-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid #34495e;
            display: flex;
            justify-content: space-between;
        }

        .month-item:hover, .month-item.active {
            background-color: var(--primary-color);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: var(--sidebar-width);
            flex: 1;
            padding: 30px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* الجداول والتنسيقات */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }
        
        .status-present { background-color: #d4edda; color: #155724; font-weight: bold; }
        .status-absent { background-color: #f8d7da; color: #721c24; font-weight: bold; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        
        button {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            body { flex-direction: column; }
            .main-content { margin-right: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h2>أرشيف الشهور 📅</h2>
    <div id="months-list">
        </div>
</div>

<div class="main-content">
    <div class="container">
        <div class="header-flex">
            <h1 id="current-view-title">تقرير دورة: جاري التحميل...</h1>
            <button onclick="syncCurrentMonthSchedule()">💾 حفظ مواعيد هذا الشهر</button>
        </div>

        <div id="status-bar" style="margin: 10px 0; padding: 10px; border-radius: 5px; display: none;"></div>

        <div id="report-content">
            <p>اختر شهراً من القائمة الجانبية لعرض التقرير والمواعيد الخاصة به.</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs",
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // المواعيد الافتراضية "الحالية" (يتم تعديلها من هنا)
    const CURRENT_MASTER_SCHEDULE = {
        "شيماء": ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"],
        "حبيبة": ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"],
        "رحاب": ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"],
        "أحمد": ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"],
        "ساندي": ["السبت", "الأحد"], // مثال لتغيير موعد
        // ... باقي الأسماء
    };

    let selectedCycleID = ""; // مثال: "2026-03" (الدورة التي تبدأ في 26 فبراير وتنتهي 25 مارس)

    // 1. توليد القائمة الجانبية للشهور (سنة كاملة)
    function generateSidebar() {
        const list = document.getElementById('months-list');
        const now = new Date();
        
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const monthName = date.toLocaleDateString('ar-EG', { month: 'long' });
            const year = date.getFullYear();
            const cycleID = `${year}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            
            const div = document.createElement('div');
            div.className = 'month-item';
            div.innerHTML = `<span>${monthName} ${year}</span> <small>26 - 25</small>`;
            div.onclick = () => loadCycleReport(cycleID, monthName, year);
            list.appendChild(div);

            // تحميل الشهر الحالي تلقائياً
            if (i === 0) div.click();
        }
    }

    // 2. وظيفة "إرسال المواعيد" (تجميد مواعيد الشهر الحالي)
    async function syncCurrentMonthSchedule() {
        if (!confirm("هل تريد حفظ المواعيد الحالية لهذه الدورة؟ لن يؤثر التغيير المستقبلي على هذا الشهر بعد الحفظ.")) return;

        try {
            await db.collection("monthly_schedules").doc(selectedCycleID).set({
                schedule: CURRENT_MASTER_SCHEDULE,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
            showStatus("✅ تم حفظ مواعيد الدورة بنجاح!", "success");
        } catch (e) {
            showStatus("❌ خطأ في الحفظ: " + e.message, "error");
        }
    }

    // 3. تحميل تقرير دورة محددة
    async function loadCycleReport(cycleID, name, year) {
        selectedCycleID = cycleID;
        document.getElementById('current-view-title').textContent = `تقرير دورة: ${name} ${year}`;
        
        // جلب المواعيد المجمدة لهذا الشهر
        const scheduleDoc = await db.collection("monthly_schedules").doc(cycleID).get();
        let activeSchedule = CURRENT_MASTER_SCHEDULE;

        if (scheduleDoc.exists) {
            activeSchedule = scheduleDoc.data().schedule;
            showStatus(`ℹ️ يتم عرض مواعيد مؤرشفة لهذا الشهر.`, "success");
        } else {
            showStatus(`⚠️ تحذير: لم يتم حفظ مواعيد لهذه الدورة بعد. يتم العرض بناءً على المواعيد الحالية.`, "error");
        }

        renderReportTable(activeSchedule);
    }

    function renderReportTable(schedule) {
        let html = `<table><thead><tr><th>الاسم</th><th>أيام العمل</th><th>الحالة</th></tr></thead><tbody>`;
        
        for (const [name, days] of Object.entries(schedule)) {
            html += `<tr>
                <td>${name}</td>
                <td>${days.join(' - ')}</td>
                <td><button onclick="alert('تفاصيل ${name}')">عرض السجل</button></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('report-content').innerHTML = html;
    }

    function showStatus(msg, type) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg;
        bar.style.display = 'block';
        bar.style.backgroundColor = type === 'success' ? '#d4edda' : '#f8d7da';
        bar.style.color = type === 'success' ? '#155724' : '#721c24';
    }

    window.onload = generateSidebar;
</script>
</body>
</html>
