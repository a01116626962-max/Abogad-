<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المشرف - تسجيل حضور المتطوعين</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-color: #333;
            --input-border: #ccc;
            --today-bg: #e3f2fd;
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-border: #444;
            --today-bg: #0d47a1;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: right;
            direction: rtl;
            transition: 0.3s;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #dc3545; 
        }
        h1 {
            color: #dc3545;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 20px;
            border: 1px solid var(--input-border); border-radius: 4px;
            box-sizing: border-box; font-size: 1em;
            background: var(--container-bg); color: var(--text-color);
        }

        .theme-toggle {
            float: left; background: #444; color: #fff; border: none;
            padding: 5px 10px; border-radius: 20px; cursor: pointer;
            font-size: 0.8em; margin-bottom: 10px;
        }

        #dates-checkbox-container {
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .date-checkbox-item {
            display: flex; align-items: center; margin-bottom: 5px; cursor: pointer; padding: 5px; border-radius: 4px;
        }
        .date-checkbox-item.today {
            background-color: var(--today-bg);
            border: 1px solid #007bff;
            font-weight: bold;
        }
        .date-checkbox-item input[type="checkbox"] {
            margin-left: 10px; margin-right: 0; width: auto; margin-bottom: 0;
        }
        
        /* تنسيق خيار الإجازة الرسمية */
        .holiday-toggle-container {
            display: flex;
            align-items: center;
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            color: #856404;
        }
        .holiday-toggle-container input[type="checkbox"] {
            width: auto; margin: 0 0 0 10px; transform: scale(1.2); cursor: pointer;
        }
        .holiday-toggle-container label { margin: 0; cursor: pointer; font-weight: bold; }

        button[type="submit"] {
            padding: 12px 20px; color: white; border: none; border-radius: 4px;
            cursor: pointer; background-color: #dc3545; transition: 0.3s;
            font-size: 1.1em; width: 100%; font-weight: bold;
        }
        button[type="submit"]:hover { background-color: #c82333; }

        #response-message { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        #whatsapp-link-container { margin-top: 20px; text-align: center; display: none; }
        #whatsapp-link-container a {
            color: white; text-decoration: none; font-weight: bold; display: block;
            padding: 10px; background-color: #25D366; border-radius: 4px;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">الوضع الليلي 🌙</button>
    <h1>👑 لوحة تحكم المشرف</h1>

    <form id="admin-form">
        <label for="volunteer-name">تحديد المتطوع:</label>
        <select id="volunteer-name" required>
            <option value="">اختر اسم المتطوع أو "الكل"</option>
            <option value="all" style="font-weight: bold; color: #dc3545;">الكل (إجراء جماعي) 👥</option>
            </select>

        <label for="registration-type">نوع التسجيل:</label>
        <select id="registration-type" required>
            <option value="حضور">حضور</option>
            <option value="اعتذار">اعتذار / إجازة</option>
        </select>

        <div class="holiday-toggle-container">
            <input type="checkbox" id="is-holiday" onchange="updateReasonToggle()">
            <label for="is-holiday">تعيين كـ "إجازة رسمية" 🌴</label>
        </div>

        <label for="admin-reason">السبب (يُسجل تلقائياً):</label>
        <input type="text" id="admin-reason" value="إداري" readonly style="background-color: #e9ecef; cursor: not-allowed;">

        <label>الشهر الحالي (من 26 إلى 25):</label>
        <div id="dates-checkbox-container"></div>
        
        <button type="submit">تسجيل البيانات</button>
    </form>

    <div id="response-message"></div>
    <div id="whatsapp-link-container"></div>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs", 
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    const whatsappNumber = "201223314173"; 

    // القائمة الجديدة المحدثة
    const FIXED_VOLUNTEERS = [
        "شيماء", "حبيبة", "رحاب", "أحمد", "محمد إبراهيم", 
        "ساندي", "معاذ", "سامى", "مازن", "معتز", "شمس"
    ];

    const JS_DAY_MAP = { 0: "الأحد", 1: "الإثنين", 2: "الثلاثاء", 3: "الأربعاء", 4: "الخميس", 5: "الجمعة", 6: "السبت" };
    const MONTH_MAP = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
    
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    function updateReasonToggle() {
        const isHoliday = document.getElementById('is-holiday').checked;
        const reasonInput = document.getElementById('admin-reason');
        const regType = document.getElementById('registration-type');
        
        if (isHoliday) {
            reasonInput.value = "إجازة رسمية";
            regType.value = "اعتذار"; // تحويل الحالة تلقائياً لاعتذار/إجازة
        } else {
            reasonInput.value = "إداري";
        }
    }

    function formatDateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function initializeForm() {
        const nameSelect = document.getElementById('volunteer-name');
        // تم إزالة الترتيب الأبجدي للحفاظ على الترتيب الذي طلبته أو يمكنك تركه
        FIXED_VOLUNTEERS.forEach(name => {
            const option = document.createElement('option');
            option.value = name; option.textContent = name;
            nameSelect.appendChild(option);
        });

        generateDatesCycle();
    }

    function generateDatesCycle() {
        const dateContainer = document.getElementById('dates-checkbox-container');
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        let startDate, endDate;
        if (now.getDate() >= 26) {
            startDate = new Date(now.getFullYear(), now.getMonth(), 26);
            endDate = new Date(now.getFullYear(), now.getMonth() + 1, 25);
        } else {
            startDate = new Date(now.getFullYear(), now.getMonth() - 1, 26);
            endDate = new Date(now.getFullYear(), now.getMonth(), 25);
        }

        let currentDate = new Date(startDate);
        let todayElementId = null;

        while (currentDate <= endDate) {
            const dateKey = formatDateKey(currentDate);
            const isToday = (currentDate.getTime() === now.getTime());
            const display = `${JS_DAY_MAP[currentDate.getDay()]} (${currentDate.getDate()} ${MONTH_MAP[currentDate.getMonth()]}) ${isToday ? ' - 📌 اليوم' : ''}`;
            
            const div = document.createElement('div');
            div.className = `date-checkbox-item ${isToday ? 'today' : ''}`;
            if (isToday) todayElementId = `item-${dateKey}`;
            div.id = `item-${dateKey}`;

            div.innerHTML = `<input type="checkbox" id="date-${dateKey}" value="${dateKey}" data-date-display="${display}">
                             <label for="date-${dateKey}">${display}</label>`;
            dateContainer.appendChild(div);

            currentDate.setDate(currentDate.getDate() + 1);
        }

        if (todayElementId) {
            setTimeout(() => {
                const todayEl = document.getElementById(todayElementId);
                todayEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
    }

    document.getElementById('admin-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const nameOrAll = document.getElementById('volunteer-name').value;
        const status = document.getElementById('registration-type').value;
        const reason = document.getElementById('admin-reason').value;

        const selectedDatesElements = document.querySelectorAll('#dates-checkbox-container input[type="checkbox"]:checked');
        if (selectedDatesElements.length === 0) {
            alert('يجب اختيار يوم واحد على الأقل.');
            return;
        }

        let targetVolunteers = nameOrAll === 'all' ? FIXED_VOLUNTEERS : [nameOrAll];
        let selectedDatesData = [];
        
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = "جاري التسجيل...";

        try {
            const now = new Date();
            const batch = db.batch();

            for (const element of selectedDatesElements) {
                const dateKey = element.value;
                const dateDisplay = element.getAttribute('data-date-display');
                selectedDatesData.push({ display: dateDisplay, key: dateKey });

                for (const volunteer of targetVolunteers) {
                    const docId = `${volunteer}_${dateKey}`;
                    const docRef = db.collection("user_attendance").doc(docId);
                    
                    const dataToSave = {
                        volunteerName: volunteer,
                        status: status,
                        reason: reason, // سيسجل "إداري" أو "إجازة رسمية"
                        registrationDateTimestamp: firebase.firestore.Timestamp.fromDate(new Date(dateKey)), 
                        dateKey: dateKey, 
                        registrationTime: dateDisplay + ' – ' + now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        registeredByAdmin: true
                    };
                    batch.set(docRef, dataToSave, { merge: true });
                }
            }

            await batch.commit();

            document.getElementById('response-message').className = 'success';
            document.getElementById('response-message').textContent = `✅ تم التسجيل بنجاح لعدد (${targetVolunteers.length}) متطوع.`;
            document.getElementById('response-message').style.display = 'block';
            
            createWhatsAppLink(nameOrAll === 'all' ? 'جميع المتطوعين (إجراء جماعي)' : nameOrAll, status, selectedDatesData, reason);
            
        } catch (error) {
            alert("خطأ أثناء التسجيل: " + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "تسجيل البيانات";
        }
    });

    function createWhatsAppLink(name, status, datesArray, reason) {
        const now = new Date();
        const fullTimeStr = now.toLocaleDateString('ar-EG') + " الساعة " + now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        let datesList = datesArray.map(d => `• ${d.display.replace(' - 📌 اليوم', '')}`).join('\n');
        
        let messageBody = `👑 *إشعار من المشرف*\n👤 المستهدف: ${name}\n📝 الحالة: *${status}*\n\n🗓️ الأيام:\n${datesList}\n\n🕒 وقت التحديث:\n${fullTimeStr}\n📌 ملاحظة/سبب: ${reason}`;
        
        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(messageBody.trim())}`;
        const container = document.getElementById('whatsapp-link-container');
        container.innerHTML = `<a href="${whatsappUrl}" target="_blank">إرسال إشعار للمجموعة عبر واتساب 📲</a>`;
        container.style.display = 'block';
    }

    window.onload = initializeForm;
</script>

</body>
</html>
