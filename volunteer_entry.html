<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حضور المتطوعين</title>
    <style>
        /* المتغيرات الأساسية للألوان */
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-color: #333;
            --input-border: #ccc;
        }

        /* أنماط الوضع الليلي */
        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-border: #444;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: right;
            direction: rtl;
            transition: 0.3s;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #007bff;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        select, input[type="text"], input[type="password"], input[type="time"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
            background: var(--container-bg);
            color: var(--text-color);
        }

        /* تنسيق حقل كلمة المرور مع الزر */
        .pass-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .pass-wrapper input {
            padding-left: 45px; /* مساحة للزر */
        }
        .toggle-pass {
            position: absolute;
            left: 10px;
            top: 10px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.9em;
            color: #007bff;
            width: auto;
            padding: 0;
        }

        /* زر الوضع الليلي */
        .theme-toggle {
            float: left;
            background: #444;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            width: auto;
            margin-bottom: 10px;
        }

        #dates-checkbox-container {
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .date-checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .date-checkbox-item input[type="checkbox"] {
            margin-left: 10px; 
            margin-right: 0;
            width: auto;
            margin-bottom: 0;
        }
        button[type="submit"] {
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #28a745;
            transition: background-color 0.3s;
            font-size: 1.1em;
            width: 100%;
        }
        button:hover { background-color: #218838; }

        #response-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            font-weight: bold;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        #whatsapp-link-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #075E54;
            color: white;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        #whatsapp-link-container a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            padding: 10px;
            background-color: #128C7E;
            border-radius: 4px;
        }
        .apology-fields {
            padding: 15px;
            border: 1px solid #ffc107;
            background-color: #fff3cd;
            color: #333;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">الوضع الليلي 🌙</button>
    <h1>📝 تسجيل حضور المتطوعين</h1>

    <form id="attendance-form">
        <label for="volunteer-name">الاسم:</label>
        <select id="volunteer-name" required>
            <option value="">اختر اسمك</option>
        </select>

        <label for="volunteer-pass">كلمة المرور:</label>
        <div class="pass-wrapper">
            <input type="password" id="volunteer-pass" maxlength="3" inputmode="numeric" placeholder="أدخل كود المرور" required>
            <button type="button" class="toggle-pass" onclick="togglePass()">إظهار</button>
        </div>

        <label for="registration-type">نوع التسجيل:</label>
        <select id="registration-type" onchange="toggleApologyFields()" required>
            <option value="حضور">حضور</option>
            <option value="اعتذار">اعتذار</option>
        </select>

        <label>اليوم/التاريخ (يمكن اختيار عدة أيام):</label>
        <div id="dates-checkbox-container" onchange="toggleApologyFields()"></div>
        
        <div id="apology-container" class="apology-fields">
            <h4>تفاصيل الاعتذار</h4>
            <label for="apology-reason">سبب الاعتذار:</label>
            <input type="text" id="apology-reason" placeholder="مثال: ظروف طارئة، مرض">
            
            <div id="late-apology-field" style="display:none;">
                <label for="late-reason">سبب تأخر الاعتذار (للمسجلين اليوم):</label>
                <input type="text" id="late-reason" placeholder="اكتب سبب التأخر هنا...">
            </div>
        </div>

        <button type="submit">تسجيل وإرسال للواتساب</button>
    </form>

    <div id="response-message"></div>
    <div id="whatsapp-link-container"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs", 
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const whatsappNumber = "201223314173"; 

    const FIXED_VOLUNTEERS = {
        "أحمد": "492", "محمد إبراهيم": "837", "محمد عبدالحميد": "159", "سامى": "628", 
        "عبدالله": "540", "حبيبة": "317", "ساندي": "641", "رحاب": "715", 
        "معاذ": "264", "مازن": "903", "إبراهيم": "371", "معتز": "826",
        "سجدة": "582", "شمس": "194"
    };

    const JS_DAY_MAP = { 0: "الأحد", 1: "الإثنين", 2: "الثلاثاء", 3: "الأربعاء", 4: "الخميس", 5: "الجمعة", 6: "السبت" };
    const MONTH_MAP = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
    
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function togglePass() {
        const passInput = document.getElementById('volunteer-pass');
        const toggleBtn = document.querySelector('.toggle-pass');
        if (passInput.type === "password") {
            passInput.type = "text";
            toggleBtn.textContent = "إخفاء";
        } else {
            passInput.type = "password";
            toggleBtn.textContent = "إظهار";
        }
    }

    function formatDateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function initializeForm() {
        const nameSelect = document.getElementById('volunteer-name');
        const dateContainer = document.getElementById('dates-checkbox-container');
        Object.keys(FIXED_VOLUNTEERS).sort().forEach(name => {
            const option = document.createElement('option');
            option.value = name; option.textContent = name;
            nameSelect.appendChild(option);
        });
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        for (let i = 0; i < 11; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            const dateKey = formatDateKey(date);
            const display = `${JS_DAY_MAP[date.getDay()]} (${date.getDate()} ${MONTH_MAP[date.getMonth()]} ${date.getFullYear()})${i===0?' - اليوم':''}`;
            const div = document.createElement('div');
            div.className = 'date-checkbox-item';
            div.innerHTML = `<input type="checkbox" id="date-${dateKey}" name="selected-dates" value="${dateKey}" data-date-display="${display}">
                             <label for="date-${dateKey}">${display}</label>`;
            dateContainer.appendChild(div);
        }
    }

    function toggleApologyFields() {
        const type = document.getElementById('registration-type').value;
        const isApology = (type === 'اعتذار');
        document.getElementById('apology-container').style.display = isApology ? 'block' : 'none';
        const todayKey = formatDateKey(new Date());
        const isTodaySelected = !!document.querySelector(`input[value="${todayKey}"]:checked`);
        document.getElementById('late-apology-field').style.display = (isApology && isTodaySelected) ? 'block' : 'none';
    }

    function validateLateReason(text) {
        const arabicCharCount = (text.match(/[\u0600-\u06FF]/g) || []).length;
        return text.length >= 8 && arabicCharCount >= 4;
    }

    document.getElementById('attendance-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('volunteer-name').value;
        const enteredPass = document.getElementById('volunteer-pass').value;
        const status = document.getElementById('registration-type').value;

        if (FIXED_VOLUNTEERS[name] !== enteredPass) {
            alert("❌ كلمة المرور غير صحيحة!");
            return;
        }

        const selectedDatesElements = document.querySelectorAll('#dates-checkbox-container input[type="checkbox"]:checked');
        if (selectedDatesElements.length === 0) {
            alert('يجب اختيار يوم واحد على الأقل.');
            return;
        }

        let fullReason = "";
        if (status === 'اعتذار') {
            const reason = document.getElementById('apology-reason').value;
            const late = document.getElementById('late-reason').value;
            const todayKey = formatDateKey(new Date());
            const isTodaySelected = !!document.querySelector(`input[value="${todayKey}"]:checked`);
            if (!reason) { alert('يرجى إدخال سبب الاعتذار.'); return; }
            if (isTodaySelected && !validateLateReason(late)) {
                alert('يرجى كتابة سبب تاخير حقيقى');
                return;
            }
            fullReason = reason + (late ? ` (تأخر: ${late})` : "");
        }

        const selectedDatesData = [];
        try {
            const now = new Date();
            for (const element of selectedDatesElements) {
                const dateKey = element.value;
                const dateDisplay = element.getAttribute('data-date-display');
                const docId = `${name}_${dateKey}`;
                const dataToSave = {
                    volunteerName: name, status: status, reason: fullReason,
                    registrationDateTimestamp: firebase.firestore.Timestamp.fromDate(new Date(dateKey)), 
                    dateKey: dateKey, 
                    registrationTime: dateDisplay + ' – ' + now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                };
                await db.collection("user_attendance").doc(docId).set(dataToSave, { merge: true });
                selectedDatesData.push({ display: dateDisplay, key: dateKey });
            }
            document.getElementById('response-message').className = 'success';
            document.getElementById('response-message').textContent = `✅ تم التسجيل بنجاح.`;
            document.getElementById('response-message').style.display = 'block';
            createWhatsAppLink(name, status, selectedDatesData, fullReason);
        } catch (error) {
            alert("خطأ أثناء التسجيل: " + error.message);
        }
    });

    function createWhatsAppLink(name, status, datesArray, reason) {
        const now = new Date();
        const fullTimeStr = now.toLocaleDateString('ar-EG') + " الساعة " + now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        let datesList = datesArray.map(d => `• ${d.display}`).join('\n');
        
        let messageBody = `👤 المتطوع: ${name}\n📝 الحالة: *${status}*\n\n🗓️ الأيام المسجلة:\n${datesList}\n\n🕒 وقت وتاريخ الإرسال:\n${fullTimeStr}${reason ? `\n\nسبب الاعتذار: ${reason}` : ""}`;
        
        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(messageBody.trim())}`;
        const container = document.getElementById('whatsapp-link-container');
        container.innerHTML = `<p>اضغط للإرسال عبر واتساب:</p><a href="${whatsappUrl}" target="_blank">إرسال البيانات 📲</a>`;
        container.style.display = 'block';
    }

    window.onload = initializeForm;
</script>

</body>
</html>
