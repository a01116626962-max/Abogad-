<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السجلات - تصفية الحضور التلقائي</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #dee2e6;
            --primary: #007bff;
            --danger: #dc3545;
            --success: #28a745;
        }

        body.dark-mode {
            --bg-color: #121212; --container-bg: #1e1e1e; --text-color: #e0e0e0; --border-color: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 20px; direction: rtl; transition: 0.3s;
        }

        .container {
            max-width: 1200px; margin: 0 auto; background: var(--container-bg);
            padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .header-section {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;
        }

        /* نظام التصفية */
        .filter-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 20px; background: rgba(0, 123, 255, 0.05);
            padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);
        }

        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 0.85em; margin-bottom: 5px; font-weight: bold; }
        .filter-group input, .filter-group select {
            padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;
            background: var(--container-bg); color: var(--text-color);
        }

        /* الجدول */
        .table-responsive { overflow-x: auto; max-height: 600px; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.85em; font-weight: bold; color: white; }
        .status-present { background-color: var(--success); }
        .status-auto { background-color: #ffc107; color: #000; } /* لون مميز للتلقائي */
        .status-absent { background-color: var(--danger); }

        .action-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 10px; background: rgba(220, 53, 69, 0.05);
            border-radius: 8px; border: 1px solid var(--border-color);
        }

        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:disabled { background: #ccc; cursor: not-allowed; }

        .auto-row { background-color: rgba(255, 193, 7, 0.05) !important; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>⚙️ لوحة تحكم السجلات</h1>
        <button class="btn" style="background:#444; color:#fff" onclick="document.body.classList.toggle('dark-mode')">الوضع الليلي 🌙</button>
    </div>

    <div class="filter-grid">
        <div class="filter-group">
            <label>البحث بالاسم:</label>
            <input type="text" id="search-name" placeholder="اكتب الاسم..." onkeyup="applyFilters()">
        </div>
        <div class="filter-group">
            <label>نوع السجلات:</label>
            <select id="filter-type" onchange="applyFilters()">
                <option value="all">كل السجلات</option>
                <option value="auto_only" style="color:red; font-weight:bold;">الحضور التلقائي فقط 🤖</option>
                <option value="manual_only">التسجيل اليدوي فقط ✍️</option>
            </select>
        </div>
        <div class="filter-group">
            <label>التاريخ من:</label>
            <input type="date" id="date-from" onchange="applyFilters()">
        </div>
        <div class="filter-group">
            <label>إلى:</label>
            <input type="date" id="date-to" onchange="applyFilters()">
        </div>
    </div>

    <div class="action-bar">
        <div>محدد: <span id="selected-count" style="color:red; font-weight:bold;">0</span> سجلات</div>
        <button class="btn btn-danger" id="delete-btn" onclick="deleteSelected()" disabled>🗑️ مسح المحدد نهائياً</button>
    </div>

    <div id="loading" style="text-align:center; padding:20px;">جاري تحميل البيانات...</div>

    <div class="table-responsive" id="table-container" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th style="width:30px;"><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th>
                    <th>الاسم</th>
                    <th>التاريخ</th>
                    <th>الحالة</th>
                    <th>السبب</th>
                    <th>وقت التسجيل</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs", 
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    let allRecords = [];

    async function loadData() {
        try {
            const snapshot = await db.collection("user_attendance").get();
            allRecords = [];
            snapshot.forEach(doc => { allRecords.push({ id: doc.id, ...doc.data() }); });
            allRecords.sort((a, b) => (b.dateKey || "").localeCompare(a.dateKey || ""));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('table-container').style.display = 'block';
            applyFilters();
        } catch (e) { alert("خطأ في التحميل: " + e.message); }
    }

    function applyFilters() {
        const name = document.getElementById('search-name').value.toLowerCase();
        const type = document.getElementById('filter-type').value;
        const from = document.getElementById('date-from').value;
        const to = document.getElementById('date-to').value;

        const filtered = allRecords.filter(r => {
            const isAuto = r.status && r.status.includes('تلقائي');
            if (name && !r.volunteerName?.toLowerCase().includes(name)) return false;
            if (type === 'auto_only' && !isAuto) return false;
            if (type === 'manual_only' && isAuto) return false;
            if (from && r.dateKey < from) return false;
            if (to && r.dateKey > to) return false;
            return true;
        });
        renderTable(filtered);
    }

    function renderTable(records) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        document.getElementById('select-all').checked = false;
        updateSelectedCount();

        records.forEach(r => {
            const isAuto = r.status && r.status.includes('تلقائي');
            // تنظيف الوقت من الأصفار 00:00
            let timeClean = r.registrationTime || '-';
            if (timeClean.includes('00:00')) {
                timeClean = timeClean.split('–')[0].trim(); // يترك التاريخ ويمسح الوقت
            }

            const tr = document.createElement('tr');
            if (isAuto) tr.classList.add('auto-row');
            
            tr.innerHTML = `
                <td><input type="checkbox" class="record-checkbox" value="${r.id}" onclick="updateSelectedCount()"></td>
                <td style="font-weight:bold;">${r.volunteerName}</td>
                <td>${r.dateKey}</td>
                <td><span class="status-badge ${isAuto ? 'status-auto' : (r.status === 'حضور' ? 'status-present' : 'status-absent')}">${r.status}</span></td>
                <td>${r.reason || '-'}</td>
                <td style="font-size:0.85em;">${timeClean}</td>
                <td><button class="btn btn-danger" style="padding:2px 8px" onclick="deleteSingle('${r.id}')">مسح</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleSelectAll() {
        const checked = document.getElementById('select-all').checked;
        document.querySelectorAll('.record-checkbox').forEach(cb => cb.checked = checked);
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const count = document.querySelectorAll('.record-checkbox:checked').length;
        document.getElementById('selected-count').textContent = count;
        document.getElementById('delete-btn').disabled = count === 0;
    }

    async function deleteSingle(id) {
        if (confirm('حذف هذا السجل؟')) {
            await db.collection("user_attendance").doc(id).delete();
            allRecords = allRecords.filter(r => r.id !== id);
            applyFilters();
        }
    }

    async function deleteSelected() {
        const ids = Array.from(document.querySelectorAll('.record-checkbox:checked')).map(cb => cb.value);
        if (confirm(`هل تريد مسح ${ids.length} سجل نهائياً؟`)) {
            const batch = db.batch();
            ids.forEach(id => batch.delete(db.collection("user_attendance").doc(id)));
            await batch.commit();
            allRecords = allRecords.filter(r => !ids.includes(r.id));
            applyFilters();
            alert('تم المسح بنجاح');
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
