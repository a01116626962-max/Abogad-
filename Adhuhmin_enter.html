<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السجلات المتقدمة - لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #dee2e6;
            --header-bg: #343a40;
            --primary: #007bff;
            --danger: #dc3545;
            --success: #28a745;
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444;
            --header-bg: #222;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
            transition: 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; color: var(--text-color); font-size: 1.8em; }

        .btn {
            padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.2s; font-size: 0.9em;
        }
        .btn-dark { background: #444; color: #fff; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-danger:disabled { background: #e49199; cursor: not-allowed; }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0, 123, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 0.85em; margin-bottom: 5px; font-weight: bold; color: #666; }
        body.dark-mode .filter-group label { color: #aaa; }
        .filter-group input, .filter-group select {
            padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;
            background: var(--container-bg); color: var(--text-color);
        }

        .table-responsive {
            overflow-x: auto;
            max-height: 600px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        th { 
            background-color: var(--header-bg); color: white; 
            position: sticky; top: 0; z-index: 10;
        }
        
        tr:hover { background-color: rgba(0, 123, 255, 0.05); }
        
        .status-badge {
            padding: 4px 8px; border-radius: 12px; font-size: 0.85em; font-weight: bold; color: white;
        }
        .status-present { background-color: var(--success); }
        .status-absent { background-color: #6c757d; }
        .status-auto { background-color: var(--danger); }

        .action-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 10px; background: rgba(220, 53, 69, 0.1);
            border-radius: 8px; border: 1px solid rgba(220, 53, 69, 0.2);
        }

        #loading { text-align: center; font-size: 1.2em; margin: 40px 0; font-weight: bold; color: var(--primary); }
        
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>⚙️ إدارة السجلات المتقدمة</h1>
        <button class="btn btn-dark" onclick="toggleTheme()">الوضع الليلي 🌙</button>
    </div>

    <div class="filter-grid">
        <div class="filter-group">
            <label>البحث بالاسم:</label>
            <input type="text" id="search-name" placeholder="اكتب اسم المتطوع..." onkeyup="applyFilters()">
        </div>
        <div class="filter-group">
            <label>عرض حسب النوع:</label>
            <select id="filter-type" onchange="applyFilters()">
                <option value="all">الكل</option>
                <option value="auto_only">الحضور التلقائي فقط (أحمر) 🤖</option>
                <option value="manual_only">التسجيل اليدوي فقط ✍️</option>
            </select>
        </div>
        <div class="filter-group">
            <label>يوم الأسبوع:</label>
            <select id="filter-day" onchange="applyFilters()">
                <option value="all">الكل</option>
                <option value="5">الجمعة فقط</option>
                <option value="6">السبت فقط</option>
            </select>
        </div>
        <div class="filter-group">
            <label>تصنيف الدورة:</label>
            <select id="filter-cycle" onchange="applyFilters()">
                <option value="all">عرض كل السجلات (الكل)</option>
                <option value="current">سجلات الشهر الحالي فقط</option>
                <option value="skipped">السجلات القديمة (المستبعدة)</option>
            </select>
        </div>
        <div class="filter-group">
            <label>الحالة:</label>
            <select id="filter-status" onchange="applyFilters()">
                <option value="all">الكل</option>
                <option value="حضور">حضور</option>
                <option value="اعتذار">اعتذار / إجازة</option>
            </select>
        </div>
        <div class="filter-group">
            <label>التاريخ (من):</label>
            <input type="date" id="date-from" onchange="applyFilters()">
        </div>
        <div class="filter-group">
            <label>التاريخ (إلى):</label>
            <input type="date" id="date-to" onchange="applyFilters()">
        </div>
    </div>

    <div class="action-bar">
        <div>
            <span id="selected-count" style="font-weight: bold; color: var(--danger);">0</span> سجلات محددة
        </div>
        <button class="btn btn-danger" id="delete-btn" onclick="deleteSelected()" disabled>
            🗑️ مسح السجلات المحددة
        </button>
    </div>

    <div id="loading">جاري مزامنة وجلب البيانات... ⏳</div>

    <div class="table-responsive" style="display: none;" id="table-container">
        <table id="records-table">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th>
                    <th>الاسم</th>
                    <th>التاريخ (سنة-شهر-يوم)</th>
                    <th>الحالة</th>
                    <th>السبب</th>
                    <th>وقت التسجيل 🕒</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs", 
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    let allRecords = []; 
    let currentStartKey, currentEndKey;

    function calculateCurrentCycle() {
        const now = new Date();
        let startDate, endDate;
        if (now.getDate() >= 26) {
            startDate = new Date(now.getFullYear(), now.getMonth(), 26);
            endDate = new Date(now.getFullYear(), now.getMonth() + 1, 25);
        } else {
            startDate = new Date(now.getFullYear(), now.getMonth() - 1, 26);
            endDate = new Date(now.getFullYear(), now.getMonth(), 25);
        }
        currentStartKey = `${startDate.getFullYear()}-${String(startDate.getMonth()+1).padStart(2,'0')}-${String(startDate.getDate()).padStart(2,'0')}`;
        currentEndKey = `${endDate.getFullYear()}-${String(endDate.getMonth()+1).padStart(2,'0')}-${String(endDate.getDate()).padStart(2,'0')}`;
    }

    async function loadData() {
        calculateCurrentCycle();
        try {
            const snapshot = await db.collection("user_attendance").get();
            allRecords = [];
            snapshot.forEach(doc => {
                allRecords.push({ id: doc.id, ...doc.data() });
            });
            allRecords.sort((a, b) => (b.dateKey || "").localeCompare(a.dateKey || ""));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('table-container').style.display = 'block';
            applyFilters();
        } catch (error) {
            document.getElementById('loading').innerHTML = `<span style="color:red;">خطأ في جلب البيانات: ${error.message}</span>`;
        }
    }

    function applyFilters() {
        const searchName = document.getElementById('search-name').value.toLowerCase();
        const cycleFilter = document.getElementById('filter-cycle').value;
        const statusFilter = document.getElementById('filter-status').value;
        const typeFilter = document.getElementById('filter-type').value;
        const dayFilter = document.getElementById('filter-day').value;
        const dateFrom = document.getElementById('date-from').value;
        const dateTo = document.getElementById('date-to').value;

        const filteredRecords = allRecords.filter(record => {
            if (!record.dateKey) return false;

            // فلتر النوع (تلقائي / يدوي)
            const isAuto = record.status && record.status.includes('تلقائي');
            if (typeFilter === 'auto_only' && !isAuto) return false;
            if (typeFilter === 'manual_only' && isAuto) return false;

            // فلتر يوم الأسبوع (5=جمعة، 6=سبت)
            if (dayFilter !== 'all') {
                const recordDate = new Date(record.dateKey);
                if (recordDate.getDay().toString() !== dayFilter) return false;
            }

            if (searchName && (!record.volunteerName || !record.volunteerName.toLowerCase().includes(searchName))) return false;
            if (statusFilter !== 'all' && record.status !== statusFilter) return false;

            const isCurrentCycle = record.dateKey >= currentStartKey && record.dateKey <= currentEndKey;
            if (cycleFilter === 'current' && !isCurrentCycle) return false;
            if (cycleFilter === 'skipped' && isCurrentCycle) return false;

            if (dateFrom && record.dateKey < dateFrom) return false;
            if (dateTo && record.dateKey > dateTo) return false;

            return true;
        });

        renderTable(filteredRecords);
    }

    function renderTable(records) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        document.getElementById('select-all').checked = false;
        updateSelectedCount();

        if(records.length === 0){
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px;">لا توجد سجلات مطابقة للبحث</td></tr>`;
            return;
        }

        records.forEach(record => {
            let statusClass = 'status-absent';
            if (record.status === 'حضور') {
                statusClass = 'status-present';
            } else if (record.status && record.status.includes('تلقائي')) {
                statusClass = 'status-auto';
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="record-checkbox" value="${record.id}" onclick="updateSelectedCount()"></td>
                <td style="font-weight:bold;">${record.volunteerName || '-'}</td>
                <td style="direction: ltr; text-align: right;">${record.dateKey || '-'}</td>
                <td><span class="status-badge ${statusClass}">${record.status || '-'}</span></td>
                <td>${record.reason || '-'}</td>
                <td style="font-size: 0.9em; color: #555;">${record.registrationTime || '-'}</td>
                <td>
                    <button class="btn btn-danger" style="padding: 4px 8px; font-size: 0.8em;" onclick="deleteSingleRecord('${record.id}')">مسح</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleSelectAll() {
        const isChecked = document.getElementById('select-all').checked;
        const checkboxes = document.querySelectorAll('.record-checkbox');
        checkboxes.forEach(cb => cb.checked = isChecked);
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const selected = document.querySelectorAll('.record-checkbox:checked').length;
        document.getElementById('selected-count').textContent = selected;
        const deleteBtn = document.getElementById('delete-btn');
        deleteBtn.disabled = selected === 0;
    }

    async function deleteSingleRecord(docId) {
        if (!confirm('هل أنت متأكد من مسح هذا السجل بصفة نهائية؟')) return;
        try {
            await db.collection("user_attendance").doc(docId).delete();
            allRecords = allRecords.filter(r => r.id !== docId);
            applyFilters();
        } catch (error) { alert('حدث خطأ'); }
    }

    async function deleteSelected() {
        const checkboxes = document.querySelectorAll('.record-checkbox:checked');
        const count = checkboxes.length;
        if (!confirm(`هل أنت متأكد من مسح عدد (${count}) سجل نهائياً؟`)) return;
        const deleteBtn = document.getElementById('delete-btn');
        deleteBtn.textContent = 'جاري المسح...';
        deleteBtn.disabled = true;
        try {
            const batch = db.batch();
            const idsToDelete = [];
            checkboxes.forEach(cb => {
                batch.delete(db.collection("user_attendance").doc(cb.value));
                idsToDelete.push(cb.value);
            });
            await batch.commit();
            allRecords = allRecords.filter(r => !idsToDelete.includes(r.id));
            applyFilters();
            alert(`✅ تم مسح ${count} سجل بنجاح.`);
        } catch (error) { alert('خطأ في المسح'); }
        finally {
            deleteBtn.textContent = '🗑️ مسح السجلات المحددة';
            updateSelectedCount();
        }
    }

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    window.onload = loadData;
</script>
</body>
</html>
