<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف السجلات المستبعدة (خارج الدورة)</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #ddd;
            --header-bg: #dc3545;
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444;
            --header-bg: #b02a37;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--header-bg);
        }

        h1 {
            color: var(--header-bg);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        body.dark-mode .stats-container {
            background-color: #2c2c2c;
        }

        .stat-box {
            padding: 10px;
        }

        .stat-number {
            font-size: 1.5em;
            display: block;
            margin-top: 5px;
        }

        .text-primary { color: #007bff; }
        .text-success { color: #28a745; }
        .text-danger { color: #dc3545; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9em;
        }

        th, td {
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            text-align: right;
        }

        th {
            background-color: var(--header-bg);
            color: white;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: rgba(0,0,0,0.02);
        }

        body.dark-mode tr:nth-child(even) {
            background-color: rgba(255,255,255,0.02);
        }

        tr:hover {
            background-color: rgba(0, 123, 255, 0.1);
        }

        .theme-toggle {
            background: #444; color: #fff; border: none;
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-size: 0.9em; margin-bottom: 15px; display: inline-block;
        }

        #loading {
            text-align: center;
            font-size: 1.2em;
            color: #666;
            margin: 20px 0;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">الوضع الليلي 🌙</button>
    
    <h1>🗄️ تفاصيل السجلات المستبعدة (الأرشيف)</h1>

    <div class="stats-container">
        <div class="stat-box">
            إجمالي السجلات
            <span class="stat-number text-primary" id="total-count">0</span>
        </div>
        <div class="stat-box">
            سجلات الدورة الحالية
            <span class="stat-number text-success" id="current-count">0</span>
        </div>
        <div class="stat-box">
            السجلات المستبعدة
            <span class="stat-number text-danger" id="skipped-count">0</span>
        </div>
    </div>

    <p style="text-align: center; font-size: 0.9em; color: gray;" id="cycle-info"></p>

    <div id="loading">جاري جلب البيانات من القاعدة... ⏳</div>

    <table id="records-table" style="display: none;">
        <thead>
            <tr>
                <th>اسم المتطوع</th>
                <th>التاريخ</th>
                <th>الحالة</th>
                <th>السبب</th>
                <th>وقت التسجيل</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCDJANXMfd6TR7R2ruLIi-xytlrB-LiCEs", 
        authDomain: "rdtt-15cbe.firebaseapp.com",
        projectId: "rdtt-15cbe",
        storageBucket: "rdtt-15cbe.firebasestorage.app",
        messagingSenderId: "219502671343",
        appId: "1:219502671343:web:b289b11869e25c9a30321a"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    function toggleTheme() { 
        document.body.classList.toggle('dark-mode'); 
    }

    function formatDateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    async function loadSkippedRecords() {
        try {
            // 1. تحديد نطاق الدورة الحالية
            const now = new Date();
            let startDate, endDate;
            if (now.getDate() >= 26) {
                startDate = new Date(now.getFullYear(), now.getMonth(), 26);
                endDate = new Date(now.getFullYear(), now.getMonth() + 1, 25);
            } else {
                startDate = new Date(now.getFullYear(), now.getMonth() - 1, 26);
                endDate = new Date(now.getFullYear(), now.getMonth(), 25);
            }

            const startKey = formatDateKey(startDate);
            const endKey = formatDateKey(endDate);

            document.getElementById('cycle-info').textContent = `الدورة الحالية المعتمدة: من ${startKey} إلى ${endKey}`;

            // 2. جلب كل البيانات
            const snapshot = await db.collection("user_attendance").get();
            
            let totalCount = snapshot.size;
            let currentCount = 0;
            let skippedRecords = [];

            // 3. فرز البيانات (مستبعدة / حالية)
            snapshot.forEach(doc => {
                const data = doc.data();
                if (!data.dateKey) return; // تخطي السجلات التالفة إن وجدت

                // السجل خارج النطاق إذا كان قبل البداية أو بعد النهاية
                if (data.dateKey < startKey || data.dateKey > endKey) {
                    skippedRecords.push(data);
                } else {
                    currentCount++;
                }
            });

            // تحديث الإحصائيات
            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('current-count').textContent = currentCount;
            document.getElementById('skipped-count').textContent = skippedRecords.length;

            // 4. ترتيب السجلات المستبعدة من الأحدث للأقدم
            skippedRecords.sort((a, b) => b.dateKey.localeCompare(a.dateKey));

            // 5. عرض البيانات في الجدول
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            skippedRecords.forEach(record => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: bold;">${record.volunteerName || '-'}</td>
                    <td><span style="background:#eee; padding:3px 8px; border-radius:4px; color:#333;">${record.dateKey || '-'}</span></td>
                    <td>
                        <span style="color: ${record.status === 'حضور' ? '#28a745' : '#dc3545'}; font-weight: bold;">
                            ${record.status || '-'}
                        </span>
                    </td>
                    <td>${record.reason || '-'}</td>
                    <td style="font-size: 0.85em; color: #666;">${record.registrationTime || '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            // إخفاء التحميل وإظهار الجدول
            document.getElementById('loading').style.display = 'none';
            document.getElementById('records-table').style.display = 'table';

        } catch (error) {
            console.error("خطأ أثناء جلب البيانات:", error);
            document.getElementById('loading').innerHTML = `<span style="color: red;">حدث خطأ أثناء تحميل البيانات: ${error.message}</span>`;
        }
    }

    // تشغيل الدالة عند تحميل الصفحة
    window.onload = loadSkippedRecords;
</script>

</body>
</html>
